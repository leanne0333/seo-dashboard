    function getDateRange(days, customFrom, customTo) {
      const to = new Date(), from = new Date();
      if (days) { from.setDate(to.getDate() - days); }
      else { return { startDate: customFrom || "2024-01-01", endDate: customTo || to.toISOString().split("T")[0] }; }
      return { startDate: from.toISOString().split("T")[0], endDate: to.toISOString().split("T")[0] };
    }

    function exportCSV(filename, headers, rows) {
      const csv = [headers.join(","), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))].join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    const iStyle = { width: "100%", padding: "10px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 14, color: "#1e293b", outline: "none", boxSizing: "border-box", background: "#fff" };

    function TrendIcon({ trend }) {
      if (trend === 1) return <span style={{ color: "#22c55e", fontWeight: 700 }}>↑</span>;
      if (trend === -1) return <span style={{ color: "#ef4444", fontWeight: 700 }}>↓</span>;

    function PosBadge({ pos, colors }) {
      const bg = pos <= 3 ? colors.badge3 : pos <= 10 ? colors.badge10 : pos <= 20 ? colors.badge20 : "#94a3b8";
      return <span style={{ background: bg, color: "#fff", borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 700 }}>{typeof pos === "number" ? pos.toFixed(1) : pos}</span>;
    }

    function DonutChart({ data }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      if (!total) return <p style={{ color: "#94a3b8", fontSize: 13 }}>No data available</p>;
      let cum = 0;
      const r = 60, cx = 80, cy = 80, sw = 22, circ = 2 * Math.PI * r;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
          <svg width={160} height={160}>
            {data.map((d, i) => {
              const pct = d.value / total, offset = circ * (1 - cum); cum += pct;
              return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw}
                strokeDasharray={`${circ * pct} ${circ * (1 - pct)}`} strokeDashoffset={offset}
                style={{ transition: "all 0.5s" }} transform={`rotate(-90 ${cx} ${cy})`} />;
            })}
            <text x={cx} y={cy - 6} textAnchor="middle" fontSize={13} fill="#64748b">Total</text>
            <text x={cx} y={cy + 12} textAnchor="middle" fontSize={16} fontWeight={700} fill="#1e293b">{total.toLocaleString()}</text>
          </svg>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {data.map((d, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: d.color, flexShrink: 0 }} />
                <span style={{ fontSize: 13, color: "#475569" }}>{d.name}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", marginLeft: "auto" }}>{Math.round(d.value / total * 100)}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Settings Panel

        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: "#fff", borderRadius: 16, width: "100%", maxWidth: 640, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.2)" }}>
            <div style={{ padding: "24px 24px 0" }}>

            </div>
            {draft.map((s, i) => (

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>

                  </div>
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Google Search Console URL</label>
                    <input value={s.gscUrl} onChange={e => update(i, "gscUrl", e.target.value)} style={iStyle} placeholder="e.g. https://www.yoursite.com/" />
                  </div>
                </div>
                <p style={{ fontSize: 12, fontWeight: 600, color: "#64748b", marginBottom: 10 }}>Brand Colours</p>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                  {[
                    { key: "primary", label: "Primary" },
                    { key: "accent", label: "Accent" },
                    { key: "accentLight", label: "Light" },
                    { key: "bg", label: "Background" },

              <button onClick={() => onSave(draft)} style={{ ...bStyle, background: draft[0].colors.primary, color: "#fff", flex: 1 }}>Save Settings</button>

    function TrafficGraph({ data, color }) {
      if (!data || data.length < 2) return null;
      const max = Math.max(...data.map(d => d.sessions));
      const min = Math.min(...data.map(d => d.sessions));
      const range = max - min || 1;
      const W = 800, H = 140, PAD = 40;
      const xStep = (W - PAD * 2) / (data.length - 1);
      const points = data.map((d, i) => ({
        x: PAD + i * xStep,
        y: PAD + (1 - (d.sessions - min) / range) * (H - PAD * 2),
        ...d
      }));
      const polyline = points.map(p => `${p.x},${p.y}`).join(" ");
      const area = `${points[0].x},${H - PAD} ` + points.map(p => `${p.x},${p.y}`).join(" ") + ` ${points[points.length-1].x},${H - PAD}`;
      const [hover, setHover] = React.useState(null);
      return (
        <div style={{ width: "100%", overflowX: "auto" }}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: 160 }}>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={color} stopOpacity="0.25" />
                <stop offset="100%" stopColor={color} stopOpacity="0.02" />
              </linearGradient>
            </defs>
            {[0, 0.25, 0.5, 0.75, 1].map((t, i) => (
              <g key={i}>
                <line x1={PAD} y1={PAD + t * (H - PAD * 2)} x2={W - PAD} y2={PAD + t * (H - PAD * 2)} stroke="#f1f5f9" strokeWidth={1} />
                <text x={PAD - 6} y={PAD + t * (H - PAD * 2) + 4} textAnchor="end" fontSize={9} fill="#94a3b8">{Math.round(max - t * range)}</text>
              </g>
            ))}
            <polygon points={area} fill="url(#grad)" />
            <polyline points={polyline} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />
            {points.map((p, i) => (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r={12} fill="transparent"
                  onMouseEnter={() => setHover(p)} onMouseLeave={() => setHover(null)} style={{ cursor: "pointer" }} />
                {hover && hover.date === p.date && (
                  <g>
                    <rect x={Math.min(p.x - 36, W - PAD - 72)} y={p.y - 32} width={72} height={24} rx={6} fill={color} />
                    <text x={Math.min(p.x, W - PAD - 36)} y={p.y - 15} textAnchor="middle" fontSize={10} fill="#fff" fontWeight={700}>{p.sessions.toLocaleString()}</text>
                    <text x={Math.min(p.x, W - PAD - 36)} y={p.y - 4} textAnchor="middle" fontSize={8} fill="rgba(255,255,255,0.8)">{p.date.slice(4,6)}/{p.date.slice(6,8)}</text>
                    <circle cx={p.x} cy={p.y} r={4} fill={color} />
                  </g>
                )}
              </g>
            ))}
          </svg>
        </div>
      );
    }

    function Sparkline({ data, color }) {
      if (!data || data.length < 2) return null;
      const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
      const W = 80, H = 30;
      const xStep = W / (data.length - 1);
      const pts = data.map((v, i) => `${i * xStep},${H - ((v - min) / range) * H}`).join(" ");
      const trend = data[data.length-1] > data[0] * 1.05 ? 1 : data[data.length-1] < data[0] * 0.95 ? -1 : 0;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
            <polyline points={pts} fill="none" stroke={trend === 1 ? "#22c55e" : trend === -1 ? "#ef4444" : "#94a3b8"} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />
          </svg>
        </div>
      );
    }

    
      const [sites, setSites] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dashSites") || "null") || DEFAULT_SITES; } catch { return DEFAULT_SITES; }
      });
      const [activeSite, setActiveSite] = useState(0);
      const [period, setPeriod] = useState(1);
      const [customFrom, setCustomFrom] = useState("");
      const [customTo, setCustomTo] = useState("");
      const [activeSection, setActiveSection] = useState("overview");
      const [expandedPage, setExpandedPage] = useState(null);
      const [kwSearch, setKwSearch] = useState("");
      const [kwSort, setKwSort] = useState("clicks");
      const [authToken, setAuthToken] = useState(null);
      const [loading, setLoading] = useState(false);
      const [sectionLoading, setSectionLoading] = useState({});
      const [error, setError] = useState(null);
      const [data, setData] = useState(null);
      const [gsiReady, setGsiReady] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const tokenClientRef = useRef(null);

      const [trackedKws, setTrackedKws] = useState(() => {
        try { return JSON.parse(localStorage.getItem("trackedKws") || '{"site1":[],"site2":[]}'); } catch { return { site1: [], site2: [] }; }
      });
      const [trackedKwInput, setTrackedKwInput] = useState("");
      const [trackedKwData, setTrackedKwData] = useState({});
      const [trackedLoading, setTrackedLoading] = useState(false);
      const [explorerUrl, setExplorerUrl] = useState("");
      const [explorerData, setExplorerData] = useState(null);
      const [explorerLoading, setExplorerLoading] = useState(false);
      const [citations, setCitations] = useState(() => {
        try { return JSON.parse(localStorage.getItem("aiCitations") || '{"site1":[],"site2":[]}'); } catch { return { site1: [], site2: [] }; }
      });
      const [citationInput, setCitationInput] = useState({ url: "", tool: "ChatGPT", query: "", date: "" });

      const site = sites[activeSite];
      const c = site.colors;
      const siteKey = site.id;

      useEffect(() => { localStorage.setItem("dashSites", JSON.stringify(sites)); }, [sites]);
      useEffect(() => { localStorage.setItem("trackedKws", JSON.stringify(trackedKws)); }, [trackedKws]);
      useEffect(() => { localStorage.setItem("aiCitations", JSON.stringify(citations)); }, [citations]);

      useEffect(() => {
        let attempts = 0;
        const init = () => {
          if (window.google?.accounts?.oauth2) {
            tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID, scope: SCOPES,
              callback: (resp) => { if (resp.error) { setError(resp.error); return; } setAuthToken(resp.access_token); },
            });
            setGsiReady(true);
          } else if (attempts < 30) { attempts++; setTimeout(init, 500); }
          else { setError("Google auth failed to load. Please refresh."); }
        };
        setTimeout(init, 500);
      }, []);

      const gscQuery = useCallback(async (token, gscUrl, body) => {
        const res = await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(gscUrl)}/searchAnalytics/query`, {
          method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        return res.json();
      }, []);

      const ga4Query = useCallback(async (token, ga4Id, body) => {
        const res = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${ga4Id}:runReport`, {
          method: "POST", headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        return res.json();
      }, []);

      const normaliseUrl = (url) => url.toLowerCase().replace(/\/$/, "") || "/";

      const fetchData = useCallback(async (token, siteIdx, periodIdx, cFrom, cTo) => {
        setLoading(true); setError(null); setData(null);
        const s = sites[siteIdx];
        if (!s.ga4Id || !s.gscUrl) {
          setError("Please configure your GA4 Property ID and GSC URL in Settings first.");
          setLoading(false); return;
        }
        const { startDate, endDate } = getDateRange(PERIODS[periodIdx].days, cFrom, cTo);
        const daysDiff = Math.round((new Date(endDate) - new Date(startDate)) / 86400000);
        const prevEnd = new Date(startDate); prevEnd.setDate(prevEnd.getDate() - 1);
        const prevStart = new Date(prevEnd); prevStart.setDate(prevStart.getDate() - daysDiff);
        const prevStartStr = prevStart.toISOString().split("T")[0];
        const prevEndStr = prevEnd.toISOString().split("T")[0];

        try {
          // Daily traffic for graph
          const dailyJson = await ga4Query(token, s.ga4Id, {
            dateRanges: [{ startDate, endDate }],
            dimensions: [{ name: "date" }],
            metrics: [{ name: "sessions" }],
            orderBys: [{ dimension: { dimensionName: "date" }, desc: false }],
          });
          const dailyData = (dailyJson.rows || []).map(r => ({
            date: r.dimensionValues[0].value,
            sessions: parseInt(r.metricValues[0].value)
          }));

          // Summary
          const sumJson = await ga4Query(token, s.ga4Id, {
            dateRanges: [{ startDate, endDate }, { startDate: prevStartStr, endDate: prevEndStr }],
            metrics: [{ name: "sessions" }, { name: "bounceRate" }, { name: "averageSessionDuration" }, { name: "newUsers" }, { name: "totalUsers" }],
          });
          if (sumJson.error) throw new Error(sumJson.error.message);
          const mv = sumJson.rows?.[0]?.metricValues || [];
          const sessions = parseInt(mv[0]?.value || 0);
          const bounceRate = (parseFloat(mv[1]?.value || 0) * 100).toFixed(1);
          const avgDur = parseInt(mv[2]?.value || 0);
          const newUsers = parseInt(mv[3]?.value || 0);
          const totalUsers = parseInt(mv[4]?.value || 1);
          const avgTime = `${Math.floor(avgDur / 60)}:${String(avgDur % 60).padStart(2, "0")}`;
          const newPct = Math.round((newUsers / totalUsers) * 100);

          // Sources
          const srcJson = await ga4Query(token, s.ga4Id, {
            dateRanges: [{ startDate, endDate }],
            dimensions: [{ name: "sessionDefaultChannelGroup" }],
            metrics: [{ name: "sessions" }],
            orderBys: [{ metric: { metricName: "sessions" }, desc: true }],
          });
          const srcMap = {};
          (srcJson.rows || []).forEach(r => { srcMap[r.dimensionValues[0].value] = parseInt(r.metricValues[0].value); });
          const sources = sourceNames.map((n, i) => ({ name: sourceLabels[i], value: srcMap[n] || 0, color: s.colors.chartColors[i] })).filter(x => x.value > 0);

          // Pages with dedup
          const pgJson = await ga4Query(token, s.ga4Id, {
            dateRanges: [{ startDate, endDate }, { startDate: prevStartStr, endDate: prevEndStr }],
            dimensions: [{ name: "pagePath" }],
            metrics: [{ name: "sessions" }, { name: "bounceRate" }, { name: "averageSessionDuration" }],
            orderBys: [{ metric: { metricName: "sessions" }, desc: true }],
            limit: 25,
          });

          const pageMap = {};
          (pgJson.rows || []).forEach(r => {
            const url = normaliseUrl(r.dimensionValues[0].value);
            if (!pageMap[url]) pageMap[url] = { url, currSessions: 0, prevSessions: 0, bounceSum: 0, durSum: 0, count: 0 };
            pageMap[url].currSessions += parseInt(r.metricValues[0].value);
            pageMap[url].prevSessions += parseInt(r.metricValues[3]?.value || 0);
            pageMap[url].bounceSum += parseFloat(r.metricValues[1].value) * 100;
            pageMap[url].durSum += parseInt(r.metricValues[2].value);
            pageMap[url].count += 1;
          });

          const mergedPages = Object.values(pageMap).sort((a, b) => b.currSessions - a.currSessions).slice(0, 20);

          const pages = await Promise.all(mergedPages.map(async ({ url, currSessions, prevSessions, bounceSum, durSum, count }) => {
            const bounce = (bounceSum / count).toFixed(1);
            const dur = Math.round(durSum / count);
            const trend = currSessions > prevSessions * 1.05 ? 1 : currSessions < prevSessions * 0.95 ? -1 : 0;
            const decayPct = prevSessions > 0 ? Math.round(((currSessions - prevSessions) / prevSessions) * 100) : 0;

            return { url, sessions: currSessions, prevSessions, bounce, avgTime: `${Math.floor(dur / 60)}:${String(dur % 60).padStart(2, "0")}`, trend, decayPct, sources: null, keywords: [], sparkline: null };
          }));

          // Referrals
          const refJson = await ga4Query(token, s.ga4Id, {
            dateRanges: [{ startDate, endDate }],
            dimensions: [{ name: "sessionSource" }],
            metrics: [{ name: "sessions" }],
            dimensionFilter: { filter: { fieldName: "sessionMedium", stringFilter: { value: "referral", matchType: "EXACT" } } },
            orderBys: [{ metric: { metricName: "sessions" }, desc: true }],
            limit: 8,
          });
          const referrals = (refJson.rows || []).map(r => ({ site: r.dimensionValues[0].value, sessions: parseInt(r.metricValues[0].value) }));

          // GSC keywords
          const gscJson = await gscQuery(token, s.gscUrl, {
            startDate, endDate, dimensions: ["query"], rowLimit: 100,
            orderBy: [{ fieldName: "clicks", sortOrder: "DESCENDING" }]
          });
          if (gscJson.error) throw new Error(`GSC: ${gscJson.error.message}`);
          const keywords = (gscJson.rows || []).map(r => ({
            kw: r.keys[0], pos: parseFloat(r.position.toFixed(1)),
            clicks: r.clicks, impressions: r.impressions, ctr: parseFloat((r.ctr * 100).toFixed(1))
          }));

          // GSC per-page keywords
          const gscPgJson = await gscQuery(token, s.gscUrl, {
            startDate, endDate, dimensions: ["page", "query"], rowLimit: 200,
            orderBy: [{ fieldName: "clicks", sortOrder: "DESCENDING" }]
          });
          const pageKwMap = {};
          (gscPgJson.rows || []).forEach(r => {
            try {
              const pg = normaliseUrl(new URL(r.keys[0]).pathname);
              if (!pageKwMap[pg]) pageKwMap[pg] = [];
              if (pageKwMap[pg].length < 8) pageKwMap[pg].push({ kw: r.keys[1], pos: parseFloat(r.position.toFixed(1)), clicks: r.clicks, impressions: r.impressions, ctr: parseFloat((r.ctr * 100).toFixed(1)) });
            } catch (e) {}
          });
          pages.forEach(p => { p.keywords = pageKwMap[p.url] || []; });

          setData({ summary: { sessions, bounceRate, avgTime, newVsReturn: { new: newPct, returning: 100 - newPct } }, sources, pages, keywords, referrals, dailyData });
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, [sites]);

      useEffect(() => {
        if (authToken) fetchData(authToken, activeSite, period, customFrom, customTo);
      }, [authToken, activeSite, period, customFrom, customTo]);

      const fetchTrackedKws = useCallback(async () => {
        if (!authToken || !trackedKws[siteKey]?.length) return;
        setTrackedLoading(true);
        const s = sites[activeSite];
        const { startDate, endDate } = getDateRange(PERIODS[period].days, customFrom, customTo);
        try {
          const results = {};
          await Promise.all(trackedKws[siteKey].map(async (kw) => {
            const json = await gscQuery(authToken, s.gscUrl, {
              startDate, endDate, dimensions: ["query"], rowLimit: 1,
              dimensionFilterGroups: [{ filters: [{ dimension: "query", operator: "equals", expression: kw }] }]
            });
            results[kw] = json.rows?.[0] ? { pos: parseFloat(json.rows[0].position.toFixed(1)), clicks: json.rows[0].clicks, impressions: json.rows[0].impressions, ctr: parseFloat((json.rows[0].ctr * 100).toFixed(1)) } : null;
          }));
          setTrackedKwData(results);
        } catch (e) { console.error(e); }
        finally { setTrackedLoading(false); }
      }, [authToken, activeSite, siteKey, trackedKws, period, customFrom, customTo, sites]);

      useEffect(() => {
        if (activeSection === "tracked" && authToken) fetchTrackedKws();
      }, [activeSection, activeSite, period]);

      const fetchExplorer = useCallback(async () => {
        if (!authToken || !explorerUrl) return;
        setExplorerLoading(true); setExplorerData(null);
        const s = sites[activeSite];
        const { startDate, endDate } = getDateRange(PERIODS[period].days, customFrom, customTo);
        const base = s.gscUrl.replace(/\/$/, "");
        const fullUrl = explorerUrl.startsWith("http") ? explorerUrl : `${base}${explorerUrl.startsWith("/") ? "" : "/"}${explorerUrl}`;
        try {
          const json = await gscQuery(authToken, s.gscUrl, {
            startDate, endDate, dimensions: ["query"], rowLimit: 50,
            dimensionFilterGroups: [{ filters: [{ dimension: "page", operator: "equals", expression: fullUrl }] }],
            orderBy: [{ fieldName: "clicks", sortOrder: "DESCENDING" }]
          });
          setExplorerData((json.rows || []).map(r => ({ kw: r.keys[0], pos: parseFloat(r.position.toFixed(1)), clicks: r.clicks, impressions: r.impressions, ctr: parseFloat((r.ctr * 100).toFixed(1)) })));
        } catch (e) { setError(e.message); }
        finally { setExplorerLoading(false); }
      }, [authToken, activeSite, explorerUrl, period, customFrom, customTo, sites]);

      const handleAuth = () => {
        if (!tokenClientRef.current) { setError("Google auth not ready — please wait and try again."); return; }
        setError(null);
        tokenClientRef.current.requestAccessToken();
      };

      const addTrackedKw = () => {
        const kw = trackedKwInput.trim().toLowerCase();
        if (!kw || trackedKws[siteKey]?.includes(kw)) return;
        setTrackedKws(prev => ({ ...prev, [siteKey]: [...(prev[siteKey] || []), kw] }));
        setTrackedKwInput("");
      };

      const [pageDetails, setPageDetails] = useState({});
      const [pageDetailLoading, setPageDetailLoading] = useState({});

      const fetchPageDetail = useCallback(async (pageUrl, originalUrl) => {
        if (!authToken || pageDetails[pageUrl]) return;
        setPageDetailLoading(prev => ({ ...prev, [pageUrl]: true }));
        const s = sites[activeSite];
        const { startDate, endDate } = getDateRange(PERIODS[period].days, customFrom, customTo);
        const daysDiff = Math.round((new Date(endDate) - new Date(startDate)) / 86400000);
        const prevEnd = new Date(startDate); prevEnd.setDate(prevEnd.getDate() - 1);
        const prevStart = new Date(prevEnd); prevStart.setDate(prevStart.getDate() - daysDiff);

        try {
          // Try both with and without trailing slash
          const urlVariants = [pageUrl, pageUrl + "/", pageUrl.replace(/\/$/, "")].filter((v, i, a) => a.indexOf(v) === i);
          
          // Per-page sources - try each URL variant
          let pgSources = [];
          for (const variant of urlVariants) {
            const pgSrcJson = await ga4Query(authToken, s.ga4Id, {
              dateRanges: [{ startDate, endDate }],
              dimensions: [{ name: "pagePath" }, { name: "sessionDefaultChannelGroup" }],
              metrics: [{ name: "sessions" }],
              dimensionFilter: { filter: { fieldName: "pagePath", stringFilter: { value: variant, matchType: "EXACT" } } },
              orderBys: [{ metric: { metricName: "sessions" }, desc: true }],
            });
            if (pgSrcJson.rows?.length) {
              const pgTotal = pgSrcJson.rows.reduce((s, r) => s + parseInt(r.metricValues[0].value), 0) || 1;
              pgSources = pgSrcJson.rows.map((r, i) => ({
                name: sourceLabels[sourceNames.indexOf(r.dimensionValues[1].value)] || r.dimensionValues[1].value,
                pct: Math.round(parseInt(r.metricValues[0].value) / pgTotal * 100),
                color: s.colors.chartColors[i] || "#94a3b8"
              }));
              break;
            }
          }

          // Daily sparkline for this page
          const dailyPgJson = await ga4Query(authToken, s.ga4Id, {
            dateRanges: [{ startDate, endDate }, { startDate: prevStart.toISOString().split("T")[0], endDate: prevEnd.toISOString().split("T")[0] }],
            dimensions: [{ name: "date" }, { name: "pagePath" }],
            metrics: [{ name: "sessions" }],
            dimensionFilter: { filter: { fieldName: "pagePath", stringFilter: { value: pageUrl, matchType: "CONTAINS" } } },
            orderBys: [{ dimension: { dimensionName: "date" }, desc: false }],
          });

          // Build daily map
          const dailyMap = {};
          (dailyPgJson.rows || []).forEach(r => {
            const date = r.dimensionValues[0].value;
            if (!dailyMap[date]) dailyMap[date] = 0;
            dailyMap[date] += parseInt(r.metricValues[0].value);
          });
          const sparkline = Object.values(dailyMap);

          // Calculate proper trend from sparkline
          let trend = 0;
          if (sparkline.length >= 2) {
            const firstHalf = sparkline.slice(0, Math.floor(sparkline.length / 2)).reduce((a, b) => a + b, 0);
            const secondHalf = sparkline.slice(Math.floor(sparkline.length / 2)).reduce((a, b) => a + b, 0);
            trend = secondHalf > firstHalf * 1.05 ? 1 : secondHalf < firstHalf * 0.95 ? -1 : 0;
          }

          setPageDetails(prev => ({ ...prev, [pageUrl]: { sources: pgSources, sparkline, trend } }));
        } catch (e) { console.error(e); }
        finally { setPageDetailLoading(prev => ({ ...prev, [pageUrl]: false })); }
      }, [authToken, activeSite, period, customFrom, customTo, sites, pageDetails]);
      const filteredKw = allKw.filter(k => k.kw.toLowerCase().includes(kwSearch.toLowerCase())).sort((a, b) => kwSort === "pos" ? a.pos - b.pos : b[kwSort] - a[kwSort]);
      const lowHanging = allKw.filter(k => k.pos >= 4 && k.pos <= 20).sort((a, b) => a.pos - b.pos);
      const decayPages = (data?.pages || []).filter(p => p.decayPct <= -20).sort((a, b) => a.decayPct - b.decayPct);
      const lowCtrKws = allKw.filter(k => k.impressions >= 100 && k.ctr < 3).sort((a, b) => b.impressions - a.impressions);
      const questionKws = allKw.filter(k => QUESTION_WORDS.some(w => k.kw.toLowerCase().startsWith(w))).sort((a, b) => b.impressions - a.impressions);
      const zeroClickKws = allKw.filter(k => k.impressions >= 50 && k.clicks === 0).sort((a, b) => b.impressions - a.impressions);
      const featuredSnippetTargets = allKw.filter(k => k.pos >= 1 && k.pos <= 3 && k.impressions >= 200 && k.ctr < 5).sort((a, b) => b.impressions - a.impressions);
      const kannMap = {};
      (data?.pages || []).forEach(p => { (p.keywords || []).forEach(k => { if (!kannMap[k.kw]) kannMap[k.kw] = []; if (!kannMap[k.kw].find(x => x.url === p.url)) kannMap[k.kw].push({ url: p.url, pos: k.pos }); }); });
      const cannibalised = Object.entries(kannMap).filter(([, pages]) => pages.length > 1).map(([kw, pages]) => ({ kw, pages }));

      const navItems = [
        { id: "overview", label: "📊 Overview" },
        { id: "pages", label: "📄 Top Pages" },
        { id: "keywords", label: "🔍 Keywords" },
        { id: "tracked", label: "📌 Tracked" },
        { id: "explorer", label: "🔎 Page Explorer" },
        { id: "opportunities", label: "🎯 Opportunities" },
        { id: "aieo", label: "🤖 AIEO" },
      ];

      return (
        <div style={{ minHeight: "100vh", background: c.bg, color: "#1e293b", transition: "background 0.3s" }}>
          {showSettings && (
            <SettingsPanel
              sites={sites}
              c={c}
              onSave={(updated) => { setSites(updated); setShowSettings(false); }}
              onClose={() => setShowSettings(false)}
            />
          )}

          {/* Header */}
          <div style={{ background: c.primary, padding: "0 24px" }}>
            <div style={{ maxWidth: 1200, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: 18, paddingBottom: 12 }}>
                <div>
                  <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: "#fff" }}>📊 Traffic & SEO Command Centre</h1>
                  <p style={{ margin: "2px 0 0", fontSize: 13, color: c.muted }}>{authToken ? `Live data · ${site.label}` : "Sign in with Google to load your data"}</p>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setShowSettings(true)} style={{ ...bStyle, background: "rgba(255,255,255,0.15)", color: "#fff", fontSize: 13 }}>⚙️ Settings</button>
                  <button onClick={handleAuth} disabled={!gsiReady && !authToken}
                    style={{ ...bStyle, background: gsiReady || authToken ? c.accent : "#94a3b8", color: "#fff", fontSize: 13, cursor: gsiReady || authToken ? "pointer" : "not-allowed" }}>
                    {authToken ? "🔄 Refresh" : gsiReady ? "🔐 Sign in" : "⏳ Loading..."}
                  </button>
                </div>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                {sites.map((s, i) => (
                  <button key={s.id} onClick={() => { setActiveSite(i); setExpandedPage(null); setActiveSection("overview");         setData(null); setExplorerData(null); setPageDetails({}); setPageDetailLoading({}); }}
                    style={{ padding: "10px 20px", border: "none", background: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, color: activeSite === i ? "#fff" : c.muted, borderBottom: activeSite === i ? `3px solid ${c.accent}` : "3px solid transparent", transition: "all 0.2s" }}>
                    {s.label || `Site ${i + 1}`}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "24px" }}>
            {!authToken && !loading && !error && (
              <div style={{ background: "#fff", borderRadius: 16, padding: 48, textAlign: "center", border: `1px solid ${c.accentLight}` }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>📊</div>
                <h2 style={{ color: c.primary, margin: "0 0 8px" }}>Welcome to your SEO Dashboard</h2>
                <p style={{ color: "#64748b", margin: "0 0 8px", maxWidth: 440, marginLeft: "auto", marginRight: "auto" }}>First time? Click ⚙️ Settings above to enter your site names, GA4 IDs, and GSC URLs. Then sign in with Google to load your live data.</p>
                <p style={{ color: "#94a3b8", margin: "0 0 24px", fontSize: 13 }}>Sign in with the Google account that has access to your GA4 and Search Console properties.</p>
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <button onClick={() => setShowSettings(true)} style={{ ...bStyle, background: c.primary, color: "#fff", padding: "14px 28px", fontSize: 15 }}>⚙️ Configure Sites</button>
                  <button onClick={handleAuth} disabled={!gsiReady}
                    style={{ ...bStyle, background: gsiReady ? c.accent : "#94a3b8", color: "#fff", padding: "14px 28px", fontSize: 15, cursor: gsiReady ? "pointer" : "not-allowed" }}>
                    {gsiReady ? "🔐 Sign in with Google" : "⏳ Loading..."}
                  </button>
                </div>
              </div>
            )}

            {error && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, padding: 20, marginBottom: 20, color: "#dc2626", fontSize: 14 }}><strong>Error:</strong> {error}</div>}

            {loading && (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: 60, gap: 16 }}>
                <div style={{ width: 40, height: 40, border: `4px solid #f1f5f9`, borderTop: `4px solid ${c.primary}`, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
                <p style={{ color: "#94a3b8", fontSize: 14 }}>Loading your data...</p>
              </div>
            )}

            {(data || ["tracked", "explorer", "aieo"].includes(activeSection)) && authToken && !loading && (
              <>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", gap: 3, background: "#fff", border: `1px solid ${c.accentLight}`, borderRadius: 10, padding: 4, marginBottom: 12, flexWrap: "wrap" }}>
                    {navItems.map(n => (
                      <button key={n.id} onClick={() => setActiveSection(n.id)}
                        style={{ ...bStyle, background: activeSection === n.id ? c.primary : "none", color: activeSection === n.id ? "#fff" : c.mid, padding: "7px 12px", fontSize: 13 }}>{n.label}</button>
                    ))}
                  </div>
                  {data && (
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {PERIODS.map((p, i) => (
                        <button key={i} onClick={() => setPeriod(i)}
                          style={{ ...bStyle, background: period === i ? c.accent : "#fff", color: period === i ? "#fff" : c.mid, border: `1px solid ${c.accentLight}`, padding: "7px 14px", fontSize: 13 }}>{p.label}</button>
                      ))}
                      {period === 3 && (
                        <div style={{ display: "flex", gap: 6, alignItems: "center", marginLeft: 8 }}>
                          <input type="date" value={customFrom} onChange={e => setCustomFrom(e.target.value)} style={{ ...iStyle, width: 140, padding: "6px 10px" }} />
                          <span style={{ color: "#94a3b8" }}>–</span>
                          <input type="date" value={customTo} onChange={e => setCustomTo(e.target.value)} style={{ ...iStyle, width: 140, padding: "6px 10px" }} />
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* OVERVIEW */}
                {activeSection === "overview" && data && (
                  <div>
                    {/* Traffic Graph */}
                    {data.dailyData && data.dailyData.length > 1 && (
                      <Card c={c} style={{ padding: 24, marginBottom: 24 }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                          <h3 style={{ fontSize: 16, fontWeight: 700, color: c.primary, margin: 0 }}>Daily Sessions</h3>
                          <span style={{ fontSize: 13, color: c.mid }}>{data.dailyData.length} days</span>
                        </div>
                        <TrafficGraph data={data.dailyData} color={c.primary} />
                      </Card>
                    )}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: 16, marginBottom: 24 }}>
                      {[
                        { label: "Total Sessions", value: data.summary.sessions.toLocaleString(), icon: "👥" },
                        { label: "Bounce Rate", value: `${data.summary.bounceRate}%`, icon: "↩️" },
                        { label: "Avg. Time on Page", value: data.summary.avgTime, icon: "⏱️" },
                        { label: "New Visitors", value: `${data.summary.newVsReturn.new}%`, icon: "✨" },
                        { label: "Returning Visitors", value: `${data.summary.newVsReturn.returning}%`, icon: "🔁" },
                      ].map((card, i) => (
                        <div key={i} style={{ background: "#fff", borderRadius: 12, padding: "18px 20px", border: `1px solid ${c.accentLight}`, borderTop: `4px solid ${i % 2 === 0 ? c.primary : c.accent}` }}>
                          <div style={{ fontSize: 22, marginBottom: 6 }}>{card.icon}</div>
                          <div style={{ fontSize: 24, fontWeight: 800, color: c.primary }}>{card.value}</div>
                          <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 2 }}>{card.label}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                      <Card c={c} style={{ padding: 24 }}>
                        <h3 style={{ margin: "0 0 20px", fontSize: 16, fontWeight: 700, color: c.primary }}>Traffic Sources</h3>
                        <DonutChart data={data.sources} />
                      </Card>
                      <Card c={c} style={{ padding: 24 }}>
                        <h3 style={{ margin: "0 0 20px", fontSize: 16, fontWeight: 700, color: c.primary }}>Top Referral Sites</h3>
                        {data.referrals.length === 0 ? <p style={{ color: "#94a3b8", fontSize: 13 }}>No referral data</p> : (
                          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                            {data.referrals.map((r, i) => (
                              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                <span style={{ fontSize: 13, color: "#475569", width: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.site}</span>
                                <div style={{ flex: 1, height: 8, background: c.bg, borderRadius: 4, overflow: "hidden" }}>
                                  <div style={{ width: `${Math.round(r.sessions / data.referrals[0].sessions * 100)}%`, height: "100%", background: c.accent, borderRadius: 4 }} />
                                </div>
                                <span style={{ fontSize: 13, fontWeight: 600, color: c.primary, width: 40, textAlign: "right" }}>{r.sessions}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </Card>
                    </div>
                  </div>
                )}

                {/* TOP PAGES */}
                {activeSection === "pages" && data && (
                  <Card c={c} style={{ overflow: "hidden" }}>
                    <SectionHeader title="Top Pages" sub="Click any row to see traffic sources and keywords" c={c}
                      onExport={() => exportCSV(`top-pages-${site.label}.csv`, ["Page", "Sessions", "Bounce Rate", "Avg Time", "vs Prev Period"],
                        data.pages.map(p => [p.url, p.sessions, `${p.bounce}%`, p.avgTime, `${p.decayPct}%`]))} />
                    <table>
                      <TableHead cols={["Page", "Sessions", "Bounce", "Avg. Time", "vs Prev", "Trend"]} c={c} />
                      <tbody>
                        {data.pages.map((p, i) => (
                          <React.Fragment key={i}>
                            <tr onClick={() => { setExpandedPage(expandedPage === i ? null : i); if (expandedPage !== i) fetchPageDetail(p.url); }}
                              style={{ cursor: "pointer", borderTop: `1px solid ${c.accentLight}`, background: expandedPage === i ? c.bg : "transparent" }}>
                              <td style={{ padding: "13px 16px", fontSize: 13, color: c.accent, fontWeight: 500, maxWidth: 260, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.url}</td>
                              <td style={{ padding: "13px 16px", fontSize: 14, fontWeight: 700, color: c.primary }}>{p.sessions.toLocaleString()}</td>
                              <td style={{ padding: "13px 16px", fontSize: 13, color: "#64748b" }}>{p.bounce}%</td>
                              <td style={{ padding: "13px 16px", fontSize: 13, color: "#64748b" }}>{p.avgTime}</td>
                              <td style={{ padding: "13px 16px", fontSize: 13, fontWeight: 600, color: p.decayPct < 0 ? "#ef4444" : "#22c55e" }}>{p.decayPct > 0 ? "+" : ""}{p.decayPct}%</td>
                              <td style={{ padding: "13px 16px" }}>
                                {pageDetails[p.url]?.sparkline ? <Sparkline data={pageDetails[p.url].sparkline} color={c.primary} /> : <TrendIcon trend={p.trend} />}
                              </td>
                            </tr>
                            {expandedPage === i && (
                              <tr>
                                <td colSpan={6} style={{ padding: "0 16px 20px", background: c.bg }}>
                                  {pageDetailLoading[p.url] ? (

                          if (!citationInput.url || !citationInput.query) return;
                          setCitations(prev => ({ ...prev, [siteKey]: [{ ...citationInput, id: Date.now() }, ...(prev[siteKey] || [])] }));
                          setCitationInput({ url: "", tool: "ChatGPT", query: "", date: "" });
                        }} style={{ ...bStyle, background: c.primary, color: "#fff" }}>+ Log Citation</button>
                      </div>
                      <table>
                        <TableHead cols={["Page", "AI Tool", "Query", "Date", ""]} c={c} />
                        <tbody>
                          {(citations[siteKey] || []).length === 0 ? <EmptyRow cols={5} msg="No citations logged yet — start tracking when AI tools cite your content!" /> :
                            (citations[siteKey] || []).map((cit, i) => (
                              <tr key={i} style={{ borderTop: `1px solid ${c.accentLight}` }}>
                                <td style={{ padding: "13px 16px", fontSize: 13, color: c.accent }}>{cit.url}</td>
                                <td style={{ padding: "13px 16px" }}><span style={{ background: c.accentLight, color: c.primary, borderRadius: 6, padding: "2px 10px", fontSize: 12, fontWeight: 600 }}>{cit.tool}</span></td>
                                <td style={{ padding: "13px 16px", fontSize: 13, color: "#475569" }}>{cit.query}</td>
                                <td style={{ padding: "13px 16px", fontSize: 13, color: "#94a3b8" }}>{cit.date}</td>
                                <td style={{ padding: "13px 16px" }}><button onClick={() => setCitations(prev => ({ ...prev, [siteKey]: prev[siteKey].filter(c => c.id !== cit.id) }))} style={{ ...bStyle, background: "#fef2f2", color: "#ef4444", padding: "4px 10px", fontSize: 12 }}>Remove</button></td>
                              </tr>
                            ))}
                        </tbody>
                      </table>
                    </Card>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
