function dateRange(days,cf,ct) {
  const to=new Date(),from=new Date();
  if(days){from.setDate(to.getDate()-days);}
  else{return{startDate:cf||"2024-01-01",endDate:ct||to.toISOString().split("T")[0]};}
  return{startDate:from.toISOString().split("T")[0],endDate:to.toISOString().split("T")[0]};
}

function prevPeriod(startDate,endDate) {
  const diff=Math.round((new Date(endDate)-new Date(startDate))/86400000);
  const pe=new Date(startDate);pe.setDate(pe.getDate()-1);
  const ps=new Date(pe);ps.setDate(ps.getDate()-diff);
  return{prevStart:ps.toISOString().split("T")[0],prevEnd:pe.toISOString().split("T")[0]};
}

function exportCSV(name,headers,rows) {
  const csv=[headers.join(","),...rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=name;a.click();
}

function DonutChart({data}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return <p style={{color:"#94a3b8",fontSize:13}}>No data</p>;
  let cum=0;
  const r=60,cx=80,cy=80,sw=22,circ=2*Math.PI*r;
  return(
    <div style={{display:"flex",alignItems:"center",gap:24}}>
      <svg width={160} height={160}>
        {data.map((d,i)=>{
          const pct=d.value/total,off=circ*(1-cum);cum+=pct;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw}
            strokeDasharray={`${circ*pct} ${circ*(1-pct)}`} strokeDashoffset={off}
            style={{transition:"all 0.5s"}} transform={`rotate(-90 ${cx} ${cy})`}/>;
        })}
        <text x={cx} y={cy-6} textAnchor="middle" fontSize={13} fill="#64748b">Total</text>
        <text x={cx} y={cy+12} textAnchor="middle" fontSize={16} fontWeight={700} fill="#1e293b">{total.toLocaleString()}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {data.map((d,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:12,height:12,borderRadius:3,background:d.color,flexShrink:0}}/>

            <span style={{fontSize:13,fontWeight:600,color:"#1e293b",marginLeft:"auto"}}>{Math.round(d.value/total*100)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TrafficGraph({data,color}){
  const [hover,setHover]=useState(null);
  if(!data||data.length<2)return null;
  const max=Math.max(...data.map(d=>d.sessions));
  const min=Math.min(...data.map(d=>d.sessions));
  const range=max-min||1;
  const W=800,H=140,PAD=40;
  const xStep=(W-PAD*2)/(data.length-1);
  const pts=data.map((d,i)=>({x:PAD+i*xStep,y:PAD+(1-(d.sessions-min)/range)*(H-PAD*2),...d}));
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
  const area=`${pts[0].x},${H-PAD} `+pts.map(p=>`${p.x},${p.y}`).join(" ")+` ${pts[pts.length-1].x},${H-PAD}`;
  return(
    <div style={{width:"100%",overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:160}}>
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        {[0,0.25,0.5,0.75,1].map((t,i)=>(
          <g key={i}>
            <line x1={PAD} y1={PAD+t*(H-PAD*2)} x2={W-PAD} y2={PAD+t*(H-PAD*2)} stroke="#f1f5f9" strokeWidth={1}/>
            <text x={PAD-6} y={PAD+t*(H-PAD*2)+4} textAnchor="end" fontSize={9} fill="#94a3b8">{Math.round(max-t*range)}</text>
          </g>
        ))}
        <polygon points={area} fill="url(#tg)"/>
        <polyline points={poly} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={12} fill="transparent" onMouseEnter={()=>setHover(p)} onMouseLeave={()=>setHover(null)} style={{cursor:"pointer"}}/>
            {hover&&hover.date===p.date&&(
              <g>
                <rect x={Math.min(p.x-36,W-PAD-72)} y={p.y-34} width={72} height={26} rx={6} fill={color}/>
                <text x={Math.min(p.x,W-PAD-36)} y={p.y-17} textAnchor="middle" fontSize={11} fill="#fff" fontWeight={700}>{p.sessions.toLocaleString()}</text>
                <text x={Math.min(p.x,W-PAD-36)} y={p.y-5} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.8)">{p.date.slice(4,6)}/{p.date.slice(6,8)}</text>
                <circle cx={p.x} cy={p.y} r={4} fill={color}/>
              </g>
            )}
          </g>
        ))}
      </svg>
    </div>
  );
}

function Sparkline({data,color}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const W=80,H=30;
  const xStep=W/(data.length-1);
  const pts=data.map((v,i)=>`${i*xStep},${H-((v-min)/range)*H}`).join(" ");
  const first=data.slice(0,Math.floor(data.length/2)).reduce((a,b)=>a+b,0);
  const last=data.slice(Math.floor(data.length/2)).reduce((a,b)=>a+b,0);
  const tc=last>first*1.05?"#22c55e":last<first*0.95?"#ef4444":"#94a3b8";
  return(
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <polyline points={pts} fill="none" stroke={tc} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

  const [sites,setSites]=useState(()=>{try{return JSON.parse(localStorage.getItem("dashSites")||"null")||DEFAULT_SITES;}catch{return DEFAULT_SITES;}});
  const [si,setSi]=useState(0);
  const [period,setPeriod]=useState(1);
  const [cf,setCf]=useState("");
  const [ct,setCt]=useState("");
  const [tab,setTab]=useState("overview");
  const [expanded,setExpanded]=useState(null);
  const [kwSearch,setKwSearch]=useState("");

  const [data,setData]=useState(null);
  const [gsiReady,setGsiReady]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [pageDetails,setPageDetails]=useState({});

  const [trackedLoading,setTrackedLoading]=useState(false);
  const [explorerUrl,setExplorerUrl]=useState("");
  const [explorerData,setExplorerData]=useState(null);
  const [explorerLoading,setExplorerLoading]=useState(false);
  const [citations,setCitations]=useState(()=>{try{return JSON.parse(localStorage.getItem("aiCitations")||'{"site1":[],"site2":[]}');}catch{return{site1:[],site2:[]};}});
  const [citInput,setCitInput]=useState({url:"",tool:"ChatGPT",query:"",date:""});
  const tcRef=useRef(null);

  const site=sites[si];
  const c=site.colors;
  const sk=site.id;

  useEffect(()=>{localStorage.setItem("dashSites",JSON.stringify(sites));},[sites]);
  useEffect(()=>{localStorage.setItem("trackedKws",JSON.stringify(trackedKws));},[trackedKws]);
  useEffect(()=>{localStorage.setItem("aiCitations",JSON.stringify(citations));},[citations]);

  useEffect(()=>{
    let attempts=0;
    const init=()=>{
      if(window.google?.accounts?.oauth2){
        tcRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:CLIENT_ID,scope:SCOPES,
          callback:(resp)=>{if(resp.error){setError(resp.error);return;}setToken(resp.access_token);}
        });
        setGsiReady(true);
      } else if(attempts<30){attempts++;setTimeout(init,500);}
      else{setError("Google auth failed to load. Please refresh.");}
    };
    setTimeout(init,500);
  },[]);

  const ga4=useCallback(async(tk,id,body)=>{
    const r=await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${id}:runReport`,{
      method:"POST",headers:{Authorization:`Bearer ${tk}`,"Content-Type":"application/json"},body:JSON.stringify(body)
    });
    return r.json();
  },[]);

  const gsc=useCallback(async(tk,url,body)=>{
    const r=await fetch(`https://searchconsole.googleapis.com/webmasters/v3/sites/${encodeURIComponent(url)}/searchAnalytics/query`,{
      method:"POST",headers:{Authorization:`Bearer ${tk}`,"Content-Type":"application/json"},body:JSON.stringify(body)
    });
    return r.json();
  },[]);

  const fetchAll=useCallback(async(tk,sIdx,pIdx,cFrom,cTo)=>{
    setLoading(true);setError(null);setData(null);setPageDetails({});
    const s=sites[sIdx];
    if(!s.ga4Id||!s.gscUrl){setError("Please configure your GA4 ID and GSC URL in Settings first.");setLoading(false);return;}
    const {startDate,endDate}=dateRange(PERIODS[pIdx].days,cFrom,cTo);
    const {prevStart,prevEnd}=prevPeriod(startDate,endDate);

    try{
      // Daily sessions for graph
      const dailyJ=await ga4(tk,s.ga4Id,{
        dateRanges:[{startDate,endDate}],
        dimensions:[{name:"date"}],
        metrics:[{name:"sessions"}],
        orderBys:[{dimension:{dimensionName:"date"},desc:false}]
      });
      const dailyData=(dailyJ.rows||[]).map(r=>({date:r.dimensionValues[0].value,sessions:parseInt(r.metricValues[0].value)}));

      // Summary
      const sumJ=await ga4(tk,s.ga4Id,{
        dateRanges:[{startDate,endDate},{startDate:prevStart,endDate:prevEnd}],
        metrics:[{name:"sessions"},{name:"bounceRate"},{name:"averageSessionDuration"},{name:"newUsers"},{name:"totalUsers"}]
      });
      if(sumJ.error)throw new Error(sumJ.error.message);
      const mv=sumJ.rows?.[0]?.metricValues||[];
      const sessions=parseInt(mv[0]?.value||0);
      const bounceRate=(parseFloat(mv[1]?.value||0)*100).toFixed(1);
      const avgDur=parseInt(mv[2]?.value||0);
      const avgTime=`${Math.floor(avgDur/60)}:${String(avgDur%60).padStart(2,"0")}`;
      const newPct=Math.round((parseInt(mv[3]?.value||0)/parseInt(mv[4]?.value||1))*100);

      // Sources
      const srcJ=await ga4(tk,s.ga4Id,{
        dateRanges:[{startDate,endDate}],
        dimensions:[{name:"sessionDefaultChannelGroup"}],
        metrics:[{name:"sessions"}],
        orderBys:[{metric:{metricName:"sessions"},desc:true}]
      });
      const srcMap={};
      (srcJ.rows||[]).forEach(r=>{srcMap[r.dimensionValues[0].value]=parseInt(r.metricValues[0].value);});
      const sources=SRC_NAMES.map((n,i)=>({name:SRC_LABELS[i],value:srcMap[n]||0,color:s.colors.chartColors[i]})).filter(x=>x.value>0);

      // Pages - fetch up to 200
      const pgJ=await ga4(tk,s.ga4Id,{
        dateRanges:[{startDate,endDate},{startDate:prevStart,endDate:prevEnd}],
        dimensions:[{name:"pagePath"}],
        metrics:[{name:"sessions"},{name:"bounceRate"},{name:"averageSessionDuration"}],
        orderBys:[{metric:{metricName:"sessions"},desc:true}],
        limit:200
      });

      // Deduplicate pages
      const pgMap={};
      (pgJ.rows||[]).forEach(r=>{
        const u=normUrl(r.dimensionValues[0].value);
        if(!pgMap[u])pgMap[u]={url:u,curr:0,prev:0,bSum:0,dSum:0,n:0};
        pgMap[u].curr+=parseInt(r.metricValues[0].value);
        pgMap[u].prev+=parseInt(r.metricValues[3]?.value||0);
        pgMap[u].bSum+=parseFloat(r.metricValues[1].value)*100;
        pgMap[u].dSum+=parseInt(r.metricValues[2].value);
        pgMap[u].n+=1;
      });

      const pages=Object.values(pgMap).sort((a,b)=>b.curr-a.curr).map(p=>{
        const dur=Math.round(p.dSum/p.n);
        const decay=p.prev>0?Math.round(((p.curr-p.prev)/p.prev)*100):0;
        return{
          url:p.url,sessions:p.curr,prevSessions:p.prev,
          bounce:(p.bSum/p.n).toFixed(1),
          avgTime:`${Math.floor(dur/60)}:${String(dur%60).padStart(2,"0")}`,
          trend:p.curr>p.prev*1.05?1:p.curr<p.prev*0.95?-1:0,
          decay,keywords:[]
        };
      });

      // Referrals
      const refJ=await ga4(tk,s.ga4Id,{
        dateRanges:[{startDate,endDate}],
        dimensions:[{name:"sessionSource"}],
        metrics:[{name:"sessions"}],
        dimensionFilter:{filter:{fieldName:"sessionMedium",stringFilter:{value:"referral",matchType:"EXACT"}}},
        orderBys:[{metric:{metricName:"sessions"},desc:true}],
        limit:8
      });
      const referrals=(refJ.rows||[]).map(r=>({site:r.dimensionValues[0].value,sessions:parseInt(r.metricValues[0].value)}));

      // GSC keywords
      const gscJ=await gsc(tk,s.gscUrl,{startDate,endDate,dimensions:["query"],rowLimit:200,orderBy:[{fieldName:"clicks",sortOrder:"DESCENDING"}]});
      if(gscJ.error)throw new Error(`GSC: ${gscJ.error.message}`);
      const keywords=(gscJ.rows||[]).map(r=>({kw:r.keys[0],pos:parseFloat(r.position.toFixed(1)),clicks:r.clicks,impressions:r.impressions,ctr:parseFloat((r.ctr*100).toFixed(1))}));

      // GSC per-page keywords
      const gscPgJ=await gsc(tk,s.gscUrl,{startDate,endDate,dimensions:["page","query"],rowLimit:500,orderBy:[{fieldName:"clicks",sortOrder:"DESCENDING"}]});
      const pkMap={};
      (gscPgJ.rows||[]).forEach(r=>{
        try{
          const pg=normUrl(new URL(r.keys[0]).pathname);
          if(!pkMap[pg])pkMap[pg]=[];
          if(pkMap[pg].length<10)pkMap[pg].push({kw:r.keys[1],pos:parseFloat(r.position.toFixed(1)),clicks:r.clicks,impressions:r.impressions,ctr:parseFloat((r.ctr*100).toFixed(1))});
        }catch(e){}
      });
      pages.forEach(p=>{p.keywords=pkMap[p.url]||[];});

      setData({summary:{sessions,bounceRate,avgTime,newVsReturn:{new:newPct,returning:100-newPct}},sources,pages,keywords,referrals,dailyData});
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[sites,ga4,gsc]);

  useEffect(()=>{
    if(token)fetchAll(token,si,period,cf,ct);
  },[token,si,period,cf,ct]);

  const fetchPageDetail=useCallback(async(pageUrl)=>{
    if(!token||pageDetails[pageUrl])return;

    const s=sites[si];
    const {startDate,endDate}=dateRange(PERIODS[period].days,cf,ct);
    const {prevStart,prevEnd}=prevPeriod(startDate,endDate);

    try{
      // Try URL variants for sources
      const variants=[pageUrl,pageUrl+"/",pageUrl.replace(/\/$/,"")].filter((v,i,a)=>a.indexOf(v)===i);
      let pgSources=[];
      for(const v of variants){
        const j=await ga4(token,s.ga4Id,{
          dateRanges:[{startDate,endDate}],
          dimensions:[{name:"pagePath"},{name:"sessionDefaultChannelGroup"}],
          metrics:[{name:"sessions"}],
          dimensionFilter:{filter:{fieldName:"pagePath",stringFilter:{value:v,matchType:"EXACT"}}},
          orderBys:[{metric:{metricName:"sessions"},desc:true}]
        });
        if(j.rows?.length){
          const tot=j.rows.reduce((s,r)=>s+parseInt(r.metricValues[0].value),0)||1;
          pgSources=j.rows.map((r,i)=>({
            name:SRC_LABELS[SRC_NAMES.indexOf(r.dimensionValues[1].value)]||r.dimensionValues[1].value,
            pct:Math.round(parseInt(r.metricValues[0].value)/tot*100),
            color:s.colors.chartColors[i]||"#94a3b8"
          }));
          break;
        }
      }

      // Daily data for sparkline - current and previous periods
      const dailyJ=await ga4(token,s.ga4Id,{
        dateRanges:[{startDate,endDate}],
        dimensions:[{name:"date"},{name:"pagePath"}],
        metrics:[{name:"sessions"}],
        dimensionFilter:{filter:{fieldName:"pagePath",stringFilter:{value:pageUrl,matchType:"CONTAINS"}}},
        orderBys:[{dimension:{dimensionName:"date"},desc:false}]
      });
      const dMap={};
      (dailyJ.rows||[]).forEach(r=>{
        const d=r.dimensionValues[0].value;
        if(!dMap[d])dMap[d]=0;
        dMap[d]+=parseInt(r.metricValues[0].value);
      });
      const sparkline=Object.values(dMap);
      const dailyChartData=Object.entries(dMap).map(([date,sessions])=>({date,sessions}));

      setPageDetails(p=>({...p,[pageUrl]:{sources:pgSources,sparkline,dailyChartData}}));
    }catch(e){console.error(e);}
    finally{setPageDetailLoading(p=>({...p,[pageUrl]:false}));}
  },[token,si,period,cf,ct,sites,pageDetails,ga4]);

  const fetchTracked=useCallback(async()=>{
    if(!token||!trackedKws[sk]?.length)return;
    setTrackedLoading(true);
    const s=sites[si];
    const {startDate,endDate}=dateRange(PERIODS[period].days,cf,ct);
    try{
      const results={};
      await Promise.all(trackedKws[sk].map(async kw=>{
        const j=await gsc(token,s.gscUrl,{startDate,endDate,dimensions:["query"],rowLimit:1,dimensionFilterGroups:[{filters:[{dimension:"query",operator:"equals",expression:kw}]}]});
        results[kw]=j.rows?.[0]?{pos:parseFloat(j.rows[0].position.toFixed(1)),clicks:j.rows[0].clicks,impressions:j.rows[0].impressions,ctr:parseFloat((j.rows[0].ctr*100).toFixed(1))}:null;
      }));
      setTrackedData(results);
    }catch(e){console.error(e);}
    finally{setTrackedLoading(false);}

  useEffect(()=>{if(tab==="tracked"&&token)fetchTracked();},[tab,si,period]);

  const fetchExplorer=useCallback(async()=>{

    const s=sites[si];

    try{

      const kwJ=await gsc(token,s.gscUrl,{startDate,endDate,dimensions:["query"],rowLimit:100,dimensionFilterGroups:[{filters:[{dimension:"page",operator:"equals",expression:full}]}],orderBy:[{fieldName:"clicks",sortOrder:"DESCENDING"}]});
      const kwData=(kwJ.rows||[]).map(r=>({kw:r.keys[0],pos:parseFloat(r.position.toFixed(1)),clicks:r.clicks,impressions:r.impressions,ctr:parseFloat((r.ctr*100).toFixed(1))}));

      const normPath=normUrl(new URL(full).pathname);

          dimensions:[{name:"pagePath"},{name:"sessionDefaultChannelGroup"}],

        });
        if(j.rows?.length){

          exSources=j.rows.map((r,i)=>({name:SRC_LABELS[SRC_NAMES.indexOf(r.dimensionValues[1].value)]||r.dimensionValues[1].value,pct:Math.round(parseInt(r.metricValues[0].value)/tot*100),color:s.colors.chartColors[i]||"#94a3b8"}));

        metrics:[{name:"sessions"}],
        dimensionFilter:{filter:{fieldName:"pagePath",stringFilter:{value:normPath,matchType:"CONTAINS"}}},
        orderBys:[{dimension:{dimensionName:"date"},desc:false}]
      });
      const dMap={};
      (dailyJ.rows||[]).forEach(r=>{const d=r.dimensionValues[0].value;if(!dMap[d])dMap[d]=0;dMap[d]+=parseInt(r.metricValues[0].value);});

        dateRanges:[{startDate,endDate},{startDate:dateRange(PERIODS[period].days,cf,ct).startDate,endDate:dateRange(PERIODS[period].days,cf,ct).endDate}],
        dimensions:[{name:"pagePath"}],
        metrics:[{name:"sessions"},{name:"bounceRate"},{name:"averageSessionDuration"}],
        dimensionFilter:{filter:{fieldName:"pagePath",stringFilter:{value:normPath,matchType:"CONTAINS"}}},
        orderBys:[{metric:{metricName:"sessions"},desc:true}],
        limit:1
      });
      const sm=sumJ.rows?.[0]?.metricValues||[];

      const exBounce=(parseFloat(sm[1]?.value||0)*100).toFixed(1);
      const exDur=parseInt(sm[2]?.value||0);
      const exAvgTime=`${Math.floor(exDur/60)}:${String(exDur%60).padStart(2,"0")}`;

      setExplorerData({keywords:kwData,sources:exSources,daily:exDaily,stats:{sessions:exSessions,bounce:exBounce,avgTime:exAvgTime}});
    }catch(e){setError(e.message);}
    finally{setExplorerLoading(false);}
  },[token,si,explorerUrl,period,cf,ct,sites,gsc,ga4]);

            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowSettings(true)} style={{...BS,background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:13}}>⚙️ Settings</button>
              <button onClick={handleAuth} disabled={!gsiReady&&!token} style={{...BS,background:gsiReady||token?c.accent:"#94a3b8",color:"#fff",fontSize:13,cursor:gsiReady||token?"pointer":"not-allowed"}}>

            {sites.map((s,i)=>(
              <button key={s.id} onClick={()=>{setSi(i);setExpanded(null);setTab("overview");setData(null);setExplorerData(null);setPageDetails({});}}
                style={{padding:"10px 20px",border:"none",background:"none",cursor:"pointer",fontSize:14,fontWeight:600,color:si===i?"#fff":c.muted,borderBottom:si===i?`3px solid ${c.accent}`:"3px solid transparent",transition:"all 0.2s"}}>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"24px"}}>
        {/* Sign in prompt */}
        {!token&&!loading&&!error&&(
          <div style={{background:"#fff",borderRadius:16,padding:48,textAlign:"center",border:`1px solid ${c.accentLight}`}}>

                  <div style={{padding:24,borderBottom:`1px solid ${c.accentLight}`}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                      <input value={citInput.url} onChange={e=>setCitInput(p=>({...p,url:e.target.value}))} placeholder="Page URL e.g. /blog/my-post/" style={IS}/>
                      <input value={citInput.query} onChange={e=>setCitInput(p=>({...p,query:e.target.value}))} placeholder="Query the AI was asked" style={IS}/>
                      <select value={citInput.tool} onChange={e=>setCitInput(p=>({...p,tool:e.target.value}))} style={IS}>
                        {["ChatGPT","Perplexity","Claude","Google AI Overview","Bing Copilot","Other"].map(t=><option key={t}>{t}</option>)}
                      </select>
                      <input type="date" value={citInput.date} onChange={e=>setCitInput(p=>({...p,date:e.target.value}))} style={IS}/>
                    </div>
                    <button onClick={()=>{if(!citInput.url||!citInput.query)return;setCitations(p=>({...p,[sk]:[{...citInput,id:Date.now()},...(p[sk]||[])]}));setCitInput({url:"",tool:"ChatGPT",query:"",date:""}); }} style={{...BS,background:c.primary,color:"#fff"}}>+ Log Citation</button>
                  </div>
                  <table>
                    <THead cols={["Page","AI Tool","Query","Date",""]} c={c}/>
                    <tbody>
                      {!(citations[sk]||[]).length?<Empty cols={5} msg="No citations logged yet"/>:
                        (citations[sk]||[]).map((cit,i)=>(
                          <tr key={i} style={{borderTop:`1px solid ${c.accentLight}`}}>
                            <td style={{padding:"13px 16px",fontSize:13,color:c.accent}}>{cit.url}</td>
                            <td style={{padding:"13px 16px"}}><span style={{background:c.accentLight,color:c.primary,borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:600}}>{cit.tool}</span></td>
                            <td style={{padding:"13px 16px",fontSize:13,color:"#475569"}}>{cit.query}</td>
                            <td style={{padding:"13px 16px",fontSize:13,color:"#94a3b8"}}>{cit.date}</td>
                            <td style={{padding:"13px 16px"}}><button onClick={()=>setCitations(p=>({...p,[sk]:p[sk].filter(x=>x.id!==cit.id)}))} style={{...BS,background:"#fef2f2",color:"#ef4444",padding:"4px 10px",fontSize:12}}>Remove</button></td>
                          </tr>
                        ))}
                    </tbody>
                  </table>
                </Card>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
